<!DOCTYPE html>

    <title>AI Email Reply</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 16px; color: #323130; }
